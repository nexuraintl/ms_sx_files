# .azure-pipelines.yml unificado
trigger:
  branches:
    include:
      - dev
      - qa
      - master

pool:
  vmImage: ubuntu-latest

variables:
  GIT_USER: $(Build.RequestedFor)
  GIT_EMAIL: $(Build.RequestedForEmail)
  GITHUB_ORG: "nexuraintl"
  GITHUB_REPO: "ms_sx_files"
  # Detectamos el nombre de la rama dinámicamente
  BRANCH_NAME: $(Build.SourceBranchName)

steps:
  - checkout: self
    clean: true
    persistCredentials: true

  # 1️⃣ Configurar Git
  - script: |
      echo "Configurando Git para el autor: $(GIT_USER) <$(GIT_EMAIL)>"
      git config --global user.name "$(GIT_USER)"
      git config --global user.email "$(GIT_EMAIL)"
    displayName: "Configurar Git"

  # 2️⃣ Sincronizar con GitHub (Dinámico)
  - script: |
      echo "Sincronizando rama: $(BRANCH_NAME) con GitHub..."
      
      git fetch --unshallow || true
      git fetch --all

      echo "Configurando remoto de GitHub..."
      git remote add github https://$(GITHUB_TOKEN_NEXURAINTL)@github.com/$(GITHUB_ORG)/$(GITHUB_REPO).git || \
      git remote set-url github https://$(GITHUB_TOKEN_NEXURAINTL)@github.com/$(GITHUB_ORG)/$(GITHUB_REPO).git

      echo "Empujando historial hacia rama $(BRANCH_NAME) en GitHub..."
      git push github HEAD:$(BRANCH_NAME) --force -v
    env:
      GITHUB_TOKEN_NEXURAINTL: $(GITHUB_TOKEN_NEXURAINTL)
    displayName: "Sincronizar $(BRANCH_NAME) con GitHub"
